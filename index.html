<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One To One Bet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-bar">
        <div class="profile">👤</div>
        <div class="app-name">ONE TO ONE BET</div>
        <div class="wallet" id="balance">₹ 0.00</div>
    </div>

    <div class="game-grid">
        <div class="game-card" onclick="playGame('Aviator')">
            <div class="game-icon">🚀</div>
            <p>Aviator</p>
        </div>
        <div class="game-card" onclick="playGame('Dragon Tiger')">
            <div class="game-icon">🐉</div>
            <p>Dragon Tiger</p>
        </div>
        <div class="game-card" onclick="playGame('7 Up Down')">
            <div class="game-icon">🎲</div>
            <p>7 Up Down</p>
        </div>
        </div>

    <div class="bottom-nav">
        <div class="nav-item">🏠 Home</div>
        <div class="nav-item">💰 Withdraw</div>
        <div class="nav-item">🎁 Offer</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
