<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>121 BET - Final Fix</title>
    <style>
        /* CSS: Clean & Professional */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #fff; color: #333; overflow-x: hidden; }

        /* Navigation Management */
        .screen { display: none; width: 100%; min-height: 100vh; }
        .active { display: block; }

        /* Header Style */
        .header { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #ddd; align-items: center; }
        .logo { font-size: 26px; font-weight: 900; color: #f2a900; font-style: italic; }
        .wallet { font-weight: bold; font-size: 14px; }

        /* Grid Layout */
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; }
        .grid-item { border: 2.5px solid #000; border-radius: 25px; aspect-ratio: 1/1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; background: #fff; }
        .grid-item img { width: 70%; height: auto; object-fit: contain; }
        .grid-item span { margin-top: 10px; font-weight: bold; font-size: 14px; }

        /* Aviator Game Area */
        .black-screen { background: #000; color: #fff; }
        .game-header { padding: 15px; display: flex; align-items: center; gap: 15px; }
        .back-btn { background: #f2a900; border: none; padding: 5px 15px; border-radius: 5px; font-weight: bold; }
        
        .live-view { height: 350px; position: relative; overflow: hidden; background: #000; border-bottom: 2px solid #333; }
        .multiplier { position: absolute; width: 100%; text-align: center; top: 40%; font-size: 50px; font-weight: 900; z-index: 10; }
        #plane-img { position: absolute; bottom: 30px; left: 30px; width: 80px; transition: transform 0.1s linear; z-index: 11; }

        /* Betting UI */
        .bet-box { padding: 30px; background: #f1f1f1; border-radius: 30px 30px 0 0; margin-top: -20px; text-align: center; position: relative; z-index: 20; color: #000; }
        .bet-btn { width: 100%; padding: 15px; background: #e91e63; color: #fff; border: none; border-radius: 12px; font-size: 20px; font-weight: bold; box-shadow: 0 4px 0 #ad1457; }
    </style>
</head>
<body>

    <div id="home" class="screen active">
        <div class="header">
            <div style="width:30px; height:30px; background:#ddd; border-radius:50%;"></div>
            <div class="logo">121 BET</div>
            <div class="wallet">💼 ₹0.00</div>
        </div>
        <div class="game-grid">
            <div class="grid-item" onclick="openGame('aviator')">
                <img src="https://i.ibb.co/LNxv3Dq/plane.png">
                <span>Aviator</span>
            </div>
            <div class="grid-item" onclick="openGame('dragon')">
                <img src="https://cdn-icons-png.flaticon.com/512/3514/3514436.png">
                <span>Dragon Tiger</span>
            </div>
            <div class="grid-item"></div><div class="grid-item"></div><div class="grid-item"></div><div class="grid-item"></div>
        </div>
    </div>

    <div id="aviator" class="screen black-screen">
        <div class="game-header">
            <button class="back-btn" onclick="closeGame()">BACK</button>
            <span>AVIATOR LIVE</span>
        </div>
        <div class="live-view">
            <div class="multiplier" id="mult">1.00x</div>
            <img id="plane-img" src="https://i.ibb.co/LNxv3Dq/plane.png">
        </div>
        <div class="bet-box">
            <input type="number" placeholder="Enter Amount" style="width:100%; padding:12px; margin-bottom:15px; border-radius:8px; border:1px solid #ccc;">
            <button class="bet-btn">BET</button>
        </div>
    </div>

    <div id="dragon" class="screen black-screen">
        <div class="game-header">
            <button class="back-btn" onclick="closeGame()">BACK</button>
            <span>DRAGON VS TIGER</span>
        </div>
        <div class="live-view" style="display:flex; justify-content:center; align-items:center; font-size:24px;">
            Coming Soon!
        </div>
    </div>

    <script>
        let loop;
        function openGame(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'aviator') startAviator();
        }

        function closeGame() {
            clearInterval(loop);
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('home').classList.add('active');
        }

        function startAviator() {
            let m = 1.00;
            const text = document.getElementById('mult');
            const plane = document.getElementById('plane-img');
            let crash = (Math.random() * 2 + 1.1).toFixed(2);

            text.style.color = "white";
            loop = setInterval(() => {
                m += 0.01;
                text.innerText = m.toFixed(2) + "x";
                plane.style.transform = `translate(${(m-1)*60}px, ${(m-1)*-30}px)`;

                if(m >= crash) {
                    clearInterval(loop);
                    text.innerText = "FLEW AWAY!";
                    text.style.color = "red";
                    setTimeout(startAviator, 3000);
                }
            }, 80);
        }
    </script>
</body>
</html>
