<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One To One Bet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="home-screen">
        <div class="top-bar">
            <div class="profile">👤 Guest</div>
            <div class="app-name">ONE TO ONE BET</div>
            <div class="wallet">Balance: ₹ 0.00</div>
        </div>
        <div class="game-grid">
            <div class="game-card" onclick="openGame('aviator')">
                <div class="icon">🚀</div>
                <p>Aviator</p>
            </div>
            <div class="game-card" onclick="openGame('dragon-tiger')">
                <div class="icon">🐉</div>
                <p>Dragon Tiger</p>
            </div>
            <div class="game-card" onclick="openGame('7up-down')">
                <div class="icon">🎲</div>
                <p>7 Up Down</p>
            </div>
        </div>
    </div>

    <div id="aviator-screen" class="hidden">
        <div class="top-bar">
            <button onclick="goHome()">⬅ Back</button>
            <span>Aviator Live</span>
        </div>
        <div class="history" id="history-box"></div>
        <div class="game-area aviator-bg">
            <div class="multiplier" id="multiplier">Waiting...</div>
            <div class="plane" id="plane">🚀</div>
        </div>
        <div class="control-panel">
            <input type="number" id="bet-amount" placeholder="Enter Bet">
            <button class="bet-btn" onclick="checkAuth()">Place Bet</button>
        </div>
    </div>

    <div id="login-modal" class="modal">
        <div class="modal-content">
            <h2>Login Required</h2>
            <input type="text" placeholder="Mobile Number">
            <button class="login-submit" onclick="loginSuccess()">Login</button>
            <button onclick="closeLogin()">Cancel</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
