        /* CSS: Layout Fix */
        body { background: #000; color: white; margin: 0; font-family: sans-serif; overflow-x: hidden; }

        /* Multi-Screen Handling */

        #home-screen { display: block; } /* Default Screen */

        /* Home Grid */
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .game-card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; text-align: center; cursor: pointer; padding-bottom: 5px; }
        .game-card img { width: 100%; border-radius: 12px 12px 0 0; height: 90px; object-fit: cover; }
        .game-card p { color: gold; font-size: 14px; margin: 8px 0; font-weight: bold; }

        /* Aviator Live View Fix */
        .aviator-container { height: 320px; background: #000; position: relative; overflow: hidden; border-bottom: 3px solid #222; }
        #plane { 
            position: absolute; 
            bottom: 20px; 
            left: 20px;

        .input-box { width: 90%; padding: 12px; background: #222; border: 1px solid #444; color: white; border-radius: 8px; margin-bottom: 10px; }
        .btn-bet { width: 100%; padding: 15px; background: #ff0000; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; }

    <script>
        let isRunning = false;
        let aviInterval;

        function startGame(id) {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('aviator-screen').style.display = 'block';
            if(id === 'aviator') {
                isRunning = true;
                runAviator();
            }
        }

        function goHome() {
            isRunning = false;
            clearInterval(aviInterval);
            document.getElementById('aviator-screen').style.display = 'none';
            document.getElementById('home-screen').style.display = 'block';
        }

        function runAviator() {
            if(!isRunning) return;

            let m = 1.00;
            let txt = document.getElementById('mult-text');
            let plane = document.getElementById('plane');
            let crashPoint = (Math.random() < 0.7) ? (1.1 + Math.random()) : (2.0 + Math.random() * 5);

            // Reset Position
            m = 1.00;
            txt.style.color = "white";
            plane.style.transform = `translate(0px, 0px)`;

            aviInterval = setInterval(() => {
                m += 0.01;
                txt.innerText = m.toFixed(2) + "x";

                // Move plane diagonally
                let moveX = (m - 1) * 60;
                let moveY = (m - 1) * -30;
                plane.style.transform = `translate(${moveX}px, ${moveY}px)`;

                if(m >= crashPoint) {
                    clearInterval(aviInterval);
                    txt.innerText = "FLEW AWAY!";
                    txt.style.color = "red";
                    setTimeout(() => { if(isRunning) runAviator(); }, 3000);
                }
            }, 70);
        }
    </script>

                    // Auto-restart after 3 seconds
                    setTimeout(() => {
                        if(gameActive) startAviatorEngine();
                    }, 3000);
                }
            }, 80);
        }

    <script>
        // JavaScript: Logic & Switching
        let historyList = [1.54, 2.10, 1.05, 4.30, 1.12];

        function openGame(gameId) {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('aviator-screen').style.display = 'block';
            renderHistory();
            startAviatorLoop();
        }

        function goHome() {
            document.getElementById('aviator-screen').style.display = 'none';
            document.getElementById('home-screen').style.display = 'block';
        }

        function startAviatorLoop() {
            let mult = 1.00;
            let plane = document.getElementById("plane-container");
            let txt = document.getElementById("multiplier");
            
            txt.style.color = "white";
            // 70% chance to crash before 1.50x (Admin/Loss Logic)
            let crashAt = (Math.random() < 0.7) ? (1.0 + Math.random() * 0.5) : (1.5 + Math.random() * 5);

            let timer = setInterval(() => {
                mult += 0.02;
                txt.innerText = mult.toFixed(2) + "x";
                
                // Animation Movement
                let moveX = (mult - 1) * 40; 
                let moveY = (mult - 1) * -20;
                plane.style.transform = `translate(${moveX}px, ${moveY}px)`;

                if (mult >= crashAt) {
                    clearInterval(timer);
                    txt.innerText = mult.toFixed(2) + "x CRASHED";
                    txt.style.color = "red";
                    
                    historyList.unshift(mult.toFixed(2));
                    if(historyList.length > 10) historyList.pop();
                    renderHistory();
                    
                    setTimeout(() => {
                        if (document.getElementById('aviator-screen').style.display === 'block') {
                            startAviatorLoop();
                        }
                    }, 3000);
                }
            }, 100);
        }

        function renderHistory() {
            let box = document.getElementById("history-box");
            box.innerHTML = historyList.map(h => `<span class="hist-item">${h}x</span>`).join('');
        }

        function checkAuth() {
            document.getElementById("login-modal").style.display = "block";
        }

        function closeLogin() {
            document.getElementById("login-modal").style.display = "none";
        }
    </script>
